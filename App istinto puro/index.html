<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istinto Puro – Verificatore</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #00E676; --dark: #0a0f0a; --card: #111811; --border: #1e2e1e; --text: #e8f5e8; }
        body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 600px; }
        .team-input { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: var(--text); margin-bottom: 10px; border: 1px solid var(--border); outline: none; }
        .verify-btn { width: 100%; background: var(--green); border: none; border-radius: 12px; padding: 18px; font-family: 'Bebas Neue'; font-size: 22px; cursor: pointer; color: var(--dark); }
        #loadingWrap { display: none; margin: 20px; color: var(--green); }
        #resultsCard { display: none; margin-top: 20px; }
        .player-item { border-left: 2px solid var(--green); padding-left: 15px; margin: 15px 0; text-align: left; }
        h1 span { color: var(--green); }
    </style>
</head>
<body>
    <h1>ISTINTO <span>PURO</span></h1>
    <div class="card">
        <input class="team-input" type="text" placeholder="Squadra 1">
        <input class="team-input" type="text" placeholder="Squadra 2">
        <button class="verify-btn" id="verifyBtn" onclick="verify()">VERIFICA VERITÀ</button>
        <div id="loadingWrap">Ricerca in corso...</div>
        <div id="resultsCard" class="card">
            <div id="statusBadge"></div>
            <div id="resultText"></div>
        </div>
    </div>

    <script>
        async function verify() {
            const inputs = document.querySelectorAll('.team-input');
            const teams = Array.from(inputs).map(i => i.value.trim()).filter(v => v !== "");
            if (teams.length < 2) return alert("Inserisci almeno 2 squadre!");

            const btn = document.getElementById('verifyBtn');
            const loading = document.getElementById('loadingWrap');
            const resultsCard = document.getElementById('resultsCard');

            btn.disabled = true;
            loading.style.display = 'block';
            resultsCard.style.display = 'none';

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teams })
                });
                const data = await response.json();
                
                document.getElementById('statusBadge').innerHTML = data.collegamento_trovato ? "TROVATO" : "PARZIALE";
                let html = '';
                data.calciatori.forEach(p => {
                    html += `<div class="player-item"><strong>${p.nome}</strong><br><small>${p.squadre_confermate}</small></div>`;
                });
                document.getElementById('resultText').innerHTML = html;
                resultsCard.style.display = 'block';
            } catch (e) {
                alert("Errore nel server.");
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
