<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istinto Puro – Verificatore</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #00E676; --dark: #0a0f0a; --card: #111811; --border: #1e2e1e; --text: #e8f5e8; }
        body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 600px; }
        .team-input { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: var(--text); margin-bottom: 10px; border: 1px solid var(--border); outline: none; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-btn { background: transparent; border: 1px dashed var(--green); color: var(--green); padding: 10px; border-radius: 10px; cursor: pointer; flex: 1; font-size: 14px; }
        .verify-btn { width: 100%; background: var(--green); border: none; border-radius: 12px; padding: 18px; font-family: 'Bebas Neue'; font-size: 24px; cursor: pointer; color: var(--dark); transition: 0.3s; }
        .verify-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #loading { display: none; margin: 20px; color: var(--green); font-weight: bold; }
        #result { margin-top: 20px; text-align: left; }
        .player-item { border-left: 2px solid var(--green); padding: 10px 15px; margin-bottom: 15px; background: rgba(0, 230, 118, 0.05); border-radius: 0 8px 8px 0; }
        h1 span { color: var(--green); }
    </style>
</head>
<body>
    <h1>ISTINTO <span>PURO</span></h1>
    <div class="card">
        <div id="teams-container">
            <input class="team-input" type="text" placeholder="Squadra 1 (es. Juventus)">
            <input class="team-input" type="text" placeholder="Squadra 2 (es. Napoli)">
        </div>
        
        <div class="btn-group">
            <button class="add-btn" onclick="addTeamField()">+ AGGIUNGI SQUADRA</button>
        </div>

        <button class="verify-btn" id="verifyBtn" onclick="verify()">TROVA CALCIATORI</button>
        
        <div id="loading">Analizzando i database storici...</div>
        <div id="result"></div>
    </div>

    <script>
        function addTeamField() {
            const container = document.getElementById('teams-container');
            const input = document.createElement('input');
            input.className = 'team-input';
            input.type = 'text';
            input.placeholder = `Squadra ${container.children.length + 1}`;
            container.appendChild(input);
        }

        async function verify() {
            const inputs = document.querySelectorAll('.team-input');
            const teams = Array.from(inputs).map(i => i.value.trim()).filter(v => v !== "");
            
            if (teams.length < 2) return alert('Inserisci almeno due squadre per trovare i collegamenti!');

            const btn = document.getElementById('verifyBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            btn.disabled = true;
            loading.style.display = 'block';
            resultDiv.innerHTML = '';

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teams })
                });

                if (!response.ok) throw new Error('Errore server');
                const data = await response.json();
                
                if (!data.calciatori || data.calciatori.length === 0) {
                    resultDiv.innerHTML = "<p style='text-align:center; opacity:0.7;'>Nessun calciatore trovato in comune tra queste squadre.</p>";
                } else {
                    let html = '';
                    data.calciatori.forEach(p => {
                        html += `
                            <div class="player-item">
                                <a href="${p.fonte_url}" target="_blank" style="color:var(--green); font-weight:bold; text-decoration:none;">${p.nome} ↗</a>
                                <p style="font-size:14px; margin: 5px 0 0 0; opacity:0.9;">${p.squadre_confermate}</p>
                            </div>`;
                    });
                    resultDiv.innerHTML = html;
                }
            } catch (e) {
                resultDiv.innerHTML = "<p style='color:#ff5252;'>Errore tecnico. Controlla la tua GEMINI_API_KEY su Vercel.</p>";
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
