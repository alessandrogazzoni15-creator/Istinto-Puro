<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istinto Puro – Verificatore</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #00E676; --dark: #0a0f0a; --card: #111811; --border: #1e2e1e; --text: #e8f5e8; }
        body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 600px; }
        .team-input { width: 100%; background: var(--dark); border: 1px solid var(--border); border-radius: 10px; padding: 14px; color: var(--text); margin-bottom: 10px; outline: none; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-btn { background: transparent; border: 1px dashed var(--green); color: var(--green); padding: 10px; border-radius: 10px; cursor: pointer; flex: 1; font-size: 14px; text-transform: uppercase; font-weight: bold; }
        .verify-btn { width: 100%; background: var(--green); border: none; border-radius: 12px; padding: 18px; font-family: 'Bebas Neue'; font-size: 24px; cursor: pointer; color: var(--dark); transition: 0.3s; }
        .verify-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #loading { display: none; margin: 20px; color: var(--green); font-weight: bold; }
        #result { margin-top: 20px; text-align: left; }
        .player-item { border-left: 2px solid var(--green); padding: 15px; margin-bottom: 15px; background: rgba(0, 230, 118, 0.05); border-radius: 0 8px 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .player-info { flex: 1; }
        .validate-btn { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .validate-btn:hover { background: var(--green); color: var(--dark); }
        h1 span { color: var(--green); }
    </style>
</head>
<body>
    <h1>ISTINTO <span>PURO</span></h1>
    <div class="card">
        <div id="teams-container">
            <input class="team-input" type="text" placeholder="Squadra 1 (es. inter)">
            <input class="team-input" type="text" placeholder="Squadra 2 (es. cremonese)">
        </div>
        
        <div class="btn-group">
            <button class="add-btn" onclick="addTeamField()">+ AGGIUNGI SQUADRA</button>
        </div>

        <button class="verify-btn" id="verifyBtn" onclick="verify()">TROVA COLLEGAMENTI</button>
        
        <div id="loading">Interrogando l'intelligenza artificiale...</div>
        <div id="result"></div>
    </div>

    <script>
        // Aggiunge campi di input (Limitato a 2 per la Beta con ID)
        function addTeamField() {
            const container = document.getElementById('teams-container');
            if (container.children.length >= 2) return alert("Per ora la verifica ufficiale funziona su 2 squadre alla volta.");
            const input = document.createElement('input');
            input.className = 'team-input';
            input.type = 'text';
            input.placeholder = `Squadra ${container.children.length + 1}`;
            container.appendChild(input);
        }

        // 1. Fase di ricerca: Chiama Gemini e recupera gli ID dal JSON
        async function verify() {
            const inputs = document.querySelectorAll('.team-input');
            const teamNames = Array.from(inputs).map(i => i.value.trim());
            
            if (teamNames.length < 2 || teamNames.some(t => t === "")) {
                return alert('Inserisci i nomi delle due squadre!');
            }

            const btn = document.getElementById('verifyBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            btn.disabled = true;
            loading.style.display = 'block';
            resultDiv.innerHTML = '';

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teamA: teamNames[0], teamB: teamNames[1] })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Errore nella ricerca');

                // Costruiamo la lista dei candidati con il tasto per la verifica ufficiale
                let html = '<h3 style="font-family:Bebas Neue; color:var(--green); margin-bottom:15px;">Candidati suggeriti:</h3>';
                data.candidati.forEach(p => {
                    html += `
                        <div class="player-item">
                            <div class="player-info">
                                <strong style="color:var(--green); font-size:18px;">${p.nome}</strong>
                                <p style="font-size:12px; margin-top:4px; opacity:0.7;">Verifica carriera ufficiale via SportAPI</p>
                            </div>
                            <button class="validate-btn" onclick="validaUfficialmente('${p.nome}', ${data.teamIds.a}, ${data.teamIds.b})">
                                VERIFICA 🔍
                            </button>
                        </div>`;
                });
                resultDiv.innerHTML = html;

            } catch (e) {
                resultDiv.innerHTML = `<p style="color:#ff5252; background:rgba(255,82,82,0.1); padding:10px; border-radius:8px;">${e.message}</p>`;
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }

        // 2. Fase di Validazione: Chiama SportAPI (Sofascore) tramite il backend
        async function validaUfficialmente(playerName, idA, idB) {
            const btn = event.target;
            const originalText = btn.innerText;
            
            btn.innerText = "CONTROLLO... ⏳";
            btn.disabled = true;

            try {
                const response = await fetch('/api/validate-career', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        playerName: playerName,
                        teamIdA: idA,
                        teamIdB: idB
                    })
                });

                const data = await response.json();

                if (data.verified) {
                    btn.innerText = "✅ UFFICIALE";
                    btn.style.background = "#00E676";
                    btn.style.color = "#0a0f0a";
                    btn.style.borderColor = "#00E676";
                } else {
                    btn.innerText = "❌ NON RISULTA";
                    btn.style.borderColor = "#ff5252";
                    btn.style.color = "#ff5252";
                    alert(data.message || "Dati ufficiali non confermati per questa coppia di squadre.");
                }
            } catch (error) {
                console.error(error);
                btn.innerText = "ERRORE ⚠️";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
